{% extends 'base.html' %}
{% block content %}
<div class="container my-3"> <!--my(margin y-axis(위쪽과 아래쪽 여백) 설정 3-->
    <table class="table">
        <thead>
        <tr class="thead-dark">
            <th>번호</th>
            <th>제목</th>
            <th>작성일시</th>
        </tr>
        </thead>
        <tbody>
        {% if question_list %}
        {% for question in question_list %}
        <tr>
            <td>{{loop.index}}</td> <!--for문을 사용할 때 자동으로 제공되는 변수-->
            <td>
                <a href="{{url_for('question.detail', question_id = question.id) }}"> {{question.subject }}</a>
            </td>
            <td>{{question.create_date}}</td>
        </tr>
        {% endfor %}
        {% else %}
        <tr>
            <td colspan="3">질문이 없습니다.</td>
        </tr>
        {% endif %}
        </tbody>
    </table>
    <a href="{{url_for('question.create') }}" class="btn btn-primary">질문 등록하기</a>
</div>
{% endblock %}
